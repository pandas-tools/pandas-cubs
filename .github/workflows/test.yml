name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vitest + tenant isolation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dojo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Connection to the CI postgres service above
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dojo_test
      # Placeholders to satisfy env shape; tests don't hit Resend / Mux
      AUTH_SECRET: ci-secret-not-real-just-long-enough-to-pass-validation
      AUTH_URL: http://localhost:3000
      AUTH_RESEND_KEY: re_ci_placeholder
      AUTH_EMAIL_FROM: test@example.com
      MUX_TOKEN_ID: ci_placeholder
      MUX_TOKEN_SECRET: ci_placeholder
      MUX_WEBHOOK_SECRET: ci_placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ADMIN_ALLOWLIST: admin@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply Drizzle migrations
        run: npm run db:migrate

      - name: Run tests (tenant isolation + auth contract)
        run: npm run test
